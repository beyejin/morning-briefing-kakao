name: Morning Briefing

on:
  workflow_dispatch:
    inputs:
      latitude:
        description: "Current latitude from iPhone Shortcut"
        required: false
      longitude:
        description: "Current longitude from iPhone Shortcut"
        required: false
  schedule:
    - cron: "30 21 * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Send morning briefing
        env:
          BRIEFING_TIMEZONE: Asia/Seoul
          BRIEFING_LATITUDE: ${{ github.event.inputs.latitude }}
          BRIEFING_LONGITUDE: ${{ github.event.inputs.longitude }}
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          ICLOUD_CALENDAR_ICS_URL: ${{ secrets.ICLOUD_CALENDAR_ICS_URL }}
          CALENDAR_ICS_URL: ${{ secrets.CALENDAR_ICS_URL }}
          GOOGLE_CALENDAR_ICS_URL: ${{ secrets.GOOGLE_CALENDAR_ICS_URL }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
        run: python -m morning_briefing.main
